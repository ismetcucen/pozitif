<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="plusGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle with shadow -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner highlight -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#plusGrad)" stroke-width="0.5" opacity="0.4"/>

  <!-- Inner glow circle (top-left) -->
  <circle cx="34" cy="34" r="18" fill="white" opacity="0.07"/>

  <!-- Plus (+) sign — rounded caps, bold and glowing -->
  <!-- Horizontal bar -->
  <rect x="24" y="43" width="52" height="14" rx="7" fill="url(#plusGrad)" filter="url(#glow)"/>
  <!-- Vertical bar -->
  <rect x="43" y="24" width="14" height="52" rx="7" fill="url(#plusGrad)" filter="url(#glow)"/>

  <!-- Small smile dot — bottom right corner, like a wink -->
  <circle cx="72" cy="72" r="5" fill="white" opacity="0.35"/>
  <circle cx="72" cy="72" r="3" fill="white" opacity="0.6"/>
</svg>